name: Publish to Modrinth & CurseForge

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to mod platforms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine Minecraft release line
        id: target
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          case "$RELEASE_TAG" in
            *-mc1.19)
              echo "game-versions=>=1.19 <1.20" >> "$GITHUB_OUTPUT"
              echo "java-version=21" >> "$GITHUB_OUTPUT"
              ;;
            *-mc1.20)
              echo "game-versions=>=1.20 <1.21" >> "$GITHUB_OUTPUT"
              echo "java-version=21" >> "$GITHUB_OUTPUT"
              ;;
            *-mc1.21)
              echo "game-versions=>=1.21 <26.1" >> "$GITHUB_OUTPUT"
              echo "java-version=21" >> "$GITHUB_OUTPUT"
              ;;
            *-mc26.2)
              echo "game-versions=26.2" >> "$GITHUB_OUTPUT"
              echo "java-version=25" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Release tag must end in a supported Minecraft target, e.g. -mc26.2"
              exit 1
              ;;
          esac

      - name: Common Setup
        uses: ./.github/actions/common-setup
        with:
          java-version: ${{ steps.target.outputs.java-version }}

      - name: Build with Gradle
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./gradlew "-Pver=$RELEASE_TAG" shadowJar

      - name: Get version from tag
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION="$RELEASE_TAG"
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Find JAR file
        id: jar
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" -type f | head -n 1)
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Found JAR: $JAR_PATH"

      - name: Upload to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: McclaWoP
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1385805
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: ${{ steps.jar.outputs.path }}

          name: Expendable Backpacks ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: ${{ github.event.release.prerelease && 'beta' || 'release' }}

          game-versions: ${{ steps.target.outputs.game-versions }}

          loaders: |
            paper
            purpur
            folia

          changelog: ${{ github.event.release.body }}

          java: |
            ${{ steps.target.outputs.java-version }}

      - name: Report success
        if: success()
        run: |
          echo "✅ Successfully published to Modrinth and CurseForge!"
          echo "Version: ${{ steps.version.outputs.version }}"
